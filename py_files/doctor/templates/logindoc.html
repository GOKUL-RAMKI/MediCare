<!DOCTYPE html>
<html>
<head>
  <title>Doctor Login</title>
  <link rel="stylesheet" href="{{ url_for('doctor.static', filename='styledoc.css') }}">
</head>

<body class="auth-body">

<div class="auth-card">
  <h2>Doctor Login</h2>

  <form method="POST" action="{{ url_for('doctor.login') }}">
    <input name="doctorId" placeholder="Doctor ID" required>
    <input name="password" type="password" placeholder="Password" required>
    <button type="submit">Login →</button>
  </form>

  {% if error %}
    <p style="color:red;">{{ error }}</p>
  {% endif %}

  <br>
  <a href="{{ url_for('doctor.signup') }}">Create Account</a>
</div>

</body>
</html>
